<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>English Adventure 🚀</title>
<style>
  :root {
    --primary: #6c3fc5;
    --primary-light: #8b5cf6;
    --secondary: #f59e0b;
    --success: #10b981;
    --danger: #ef4444;
    --bg: #0f0c29;
    --card: #1e1a3e;
    --card2: #2a2560;
    --text: #f0eaff;
    --text-dim: #a89cc8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 0;
  }
  #app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 12px;
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; gap: 16px; animation: fadeIn .3s ease; }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  /* ── HOME ── */
  .hero { text-align: center; padding: 24px 0 8px; }
  .hero h1 { font-size: 2.2rem; font-weight: 900; background: linear-gradient(90deg,#a78bfa,#f59e0b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .hero p { color: var(--text-dim); margin-top: 6px; font-size: 1rem; }
  .unit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .unit-btn {
    background: var(--card); border: 2px solid var(--card2);
    border-radius: 16px; padding: 14px 10px; text-align: center;
    cursor: pointer; transition: all .2s; color: var(--text);
    font-size: .85rem; font-weight: 600;
  }
  .unit-btn:hover, .unit-btn.selected { border-color: var(--primary-light); background: var(--card2); transform: translateY(-2px); }
  .unit-btn .unit-icon { font-size: 1.8rem; display: block; margin-bottom: 4px; }
  .unit-btn.all { grid-column: span 2; background: linear-gradient(135deg,#6c3fc5,#3b82f6); border-color: transparent; font-size: 1rem; padding: 16px; }
  .start-btn {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white; border: none; border-radius: 16px;
    padding: 18px; font-size: 1.1rem; font-weight: 700;
    cursor: pointer; transition: all .2s; box-shadow: 0 4px 20px rgba(108,63,197,.5);
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(108,63,197,.7); }
  .start-btn:active { transform: translateY(0); }

  /* ── GAME HEADER ── */
  .game-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
  .back-btn { background: var(--card); border: none; color: var(--text-dim); border-radius: 12px; padding: 8px 14px; cursor: pointer; font-size: .85rem; }
  .score-display { display: flex; align-items: center; gap: 8px; }
  .stars-count { font-size: 1rem; font-weight: 700; color: var(--secondary); }
  .hearts { font-size: 1.1rem; letter-spacing: 2px; }

  /* ── PROGRESS ── */
  .progress-bar { background: var(--card); border-radius: 99px; height: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg,#6c3fc5,#a78bfa); border-radius: 99px; transition: width .4s ease; }
  .progress-label { text-align: center; font-size: .8rem; color: var(--text-dim); }

  /* ── QUESTION CARD ── */
  .question-card {
    background: var(--card); border-radius: 20px; padding: 24px 20px;
    text-align: center; border: 2px solid var(--card2);
    box-shadow: 0 8px 32px rgba(0,0,0,.3);
  }
  .q-type-badge {
    display: inline-block; background: var(--card2); border-radius: 99px;
    padding: 4px 14px; font-size: .75rem; color: var(--text-dim);
    margin-bottom: 14px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase;
  }
  .q-word {
    font-size: 2rem; font-weight: 800; color: var(--text);
    line-height: 1.2; margin-bottom: 6px;
  }
  .q-word.hebrew { font-size: 2.2rem; direction: rtl; }
  .q-hint { font-size: .85rem; color: var(--text-dim); }
  .q-sentence { font-size: 1.3rem; font-weight: 600; line-height: 1.5; }
  .blank { color: var(--secondary); border-bottom: 3px solid var(--secondary); padding: 0 8px; display: inline-block; min-width: 60px; }

  /* ── OPTIONS ── */
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .opt-btn {
    background: var(--card); border: 2px solid var(--card2);
    color: var(--text); border-radius: 16px; padding: 16px 10px;
    font-size: 1rem; font-weight: 600; cursor: pointer;
    transition: all .15s; text-align: center; line-height: 1.3;
    min-height: 64px; display: flex; align-items: center; justify-content: center;
  }
  .opt-btn.hebrew-opt { font-size: 1.1rem; direction: rtl; }
  .opt-btn:active { transform: scale(.96); }
  .opt-btn.correct { background: rgba(16,185,129,.25); border-color: var(--success); color: #6ee7b7; }
  .opt-btn.wrong { background: rgba(239,68,68,.2); border-color: var(--danger); color: #fca5a5; }
  .opt-btn.disabled { pointer-events: none; }

  /* ── FEEDBACK ── */
  .feedback {
    text-align: center; border-radius: 16px; padding: 14px;
    font-size: 1rem; font-weight: 700; display: none;
  }
  .feedback.show { display: block; animation: popIn .3s ease; }
  .feedback.correct { background: rgba(16,185,129,.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,.3); }
  .feedback.wrong { background: rgba(239,68,68,.1); color: #fca5a5; border: 1px solid rgba(239,68,68,.3); }
  @keyframes popIn { from { transform:scale(.8); opacity:0; } to { transform:scale(1); opacity:1; } }

  /* ── NEXT BTN ── */
  .next-btn {
    background: var(--primary); color: white; border: none;
    border-radius: 16px; padding: 16px; font-size: 1rem;
    font-weight: 700; cursor: pointer; display: none;
    transition: all .2s;
  }
  .next-btn.show { display: block; animation: fadeIn .2s ease; }
  .next-btn:active { transform: scale(.97); }

  /* ── RESULTS ── */
  .results-card {
    background: var(--card); border-radius: 24px; padding: 32px 24px;
    text-align: center; border: 2px solid var(--card2);
  }
  .result-emoji { font-size: 5rem; display: block; margin-bottom: 12px; animation: bounce 1s ease infinite alternate; }
  @keyframes bounce { from { transform:translateY(0); } to { transform:translateY(-12px); } }
  .result-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; }
  .result-score { font-size: 3.5rem; font-weight: 900; color: var(--secondary); margin: 12px 0; }
  .result-subtitle { color: var(--text-dim); font-size: .95rem; margin-bottom: 20px; }
  .result-stars { font-size: 2rem; margin: 8px 0 20px; letter-spacing: 4px; }
  .result-btns { display: flex; flex-direction: column; gap: 10px; }

  /* ── LISTEN BUTTON ── */
  .listen-btn {
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    border: none; border-radius: 20px; color: white;
    font-size: 1.1rem; font-weight: 700; cursor: pointer;
    padding: 18px 32px; margin: 8px auto 4px; display: block;
    box-shadow: 0 4px 20px rgba(99,102,241,.5);
    transition: all .2s;
  }
  .listen-btn:active { transform: scale(.95); }
  .listen-btn.playing { animation: pulse 0.8s ease infinite alternate; }
  @keyframes pulse { from { box-shadow: 0 4px 20px rgba(99,102,241,.5); } to { box-shadow: 0 4px 32px rgba(99,102,241,.9); transform: scale(1.04); } }
  .listen-hint { color: var(--text-dim); font-size: .8rem; text-align: center; margin-top: 4px; }

  /* ── WRONG ANSWERS REVIEW ── */
  .review-section { margin-top: 20px; text-align: left; }
  .review-title { font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 10px; }
  .review-item {
    background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.25);
    border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
  }
  .review-q { font-size: .9rem; color: var(--text-dim); margin-bottom: 6px; line-height: 1.4; }
  .review-q strong { color: var(--text); }
  .review-chosen { font-size: .85rem; color: #fca5a5; margin-bottom: 2px; }
  .review-correct { font-size: .85rem; color: #6ee7b7; font-weight: 700; }

  .result-btn {
    padding: 16px; border-radius: 16px; font-size: 1rem;
    font-weight: 700; cursor: pointer; border: none; transition: all .2s;
  }
  .result-btn.primary { background: linear-gradient(135deg,var(--primary),var(--primary-light)); color: white; }
  .result-btn.secondary { background: var(--card2); color: var(--text); }

  /* ── STREAK ── */
  .streak-badge {
    text-align: center; font-size: .85rem; color: var(--secondary);
    font-weight: 700; min-height: 24px;
  }

  /* ── CONFETTI ── */
  .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; overflow: hidden; }
  .confetti-piece {
    position: absolute; width: 10px; height: 10px; border-radius: 2px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* ── SHAKE ── */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
  .shake { animation: shake .4s ease; }

  .section-title {
    font-size: .75rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-dim); margin-bottom: 4px;
  }

  /* ── PROFILE SCREEN ── */
  .profile-hero { text-align: center; padding: 28px 0 8px; }
  .profile-hero h1 { font-size: 2rem; font-weight: 900; background: linear-gradient(90deg,#a78bfa,#f59e0b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .profile-hero p { color: var(--text-dim); margin-top: 6px; }
  .players-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .player-card {
    background: var(--card); border: 2px solid var(--card2);
    border-radius: 18px; padding: 16px 8px; text-align: center;
    cursor: pointer; transition: all .2s;
  }
  .player-card:hover { border-color: var(--primary-light); transform: translateY(-2px); }
  .player-avatar {
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; margin: 0 auto 8px; font-weight: 900;
  }
  .player-name { font-size: .85rem; font-weight: 700; color: var(--text); }
  .player-stats { font-size: .7rem; color: var(--text-dim); margin-top: 2px; }
  .add-player-btn {
    background: var(--card); border: 2px dashed var(--card2);
    border-radius: 18px; padding: 16px 8px; text-align: center;
    cursor: pointer; transition: all .2s; color: var(--text-dim);
    font-size: .85rem; font-weight: 600;
  }
  .add-player-btn:hover { border-color: var(--primary-light); color: var(--text); }
  .add-player-btn .plus { font-size: 2rem; display: block; margin-bottom: 4px; }

  /* ── NEW USER FORM ── */
  .form-card { background: var(--card); border-radius: 20px; padding: 28px 20px; border: 2px solid var(--card2); }
  .form-card h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 6px; }
  .form-card p { color: var(--text-dim); font-size: .9rem; margin-bottom: 20px; }
  .avatar-picker { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px; }
  .avatar-opt {
    font-size: 1.6rem; text-align: center; padding: 8px 4px;
    border-radius: 12px; cursor: pointer; border: 2px solid transparent;
    transition: all .15s; background: var(--card2);
  }
  .avatar-opt.selected { border-color: var(--primary-light); background: rgba(108,63,197,.3); }
  .name-input {
    width: 100%; background: var(--card2); border: 2px solid var(--card2);
    border-radius: 12px; padding: 14px 16px; font-size: 1rem;
    color: var(--text); outline: none; margin-bottom: 16px;
    transition: border-color .2s;
  }
  .name-input:focus { border-color: var(--primary-light); }
  .name-input::placeholder { color: var(--text-dim); }
  .form-btns { display: flex; gap: 10px; }
  .form-btn { flex: 1; padding: 14px; border-radius: 14px; font-size: .95rem; font-weight: 700; cursor: pointer; border: none; transition: all .2s; }
  .form-btn.primary { background: var(--primary); color: white; }
  .form-btn.ghost { background: var(--card2); color: var(--text-dim); }

  /* ── USER BADGE IN GAME ── */
  .user-badge { font-size: .8rem; color: var(--text-dim); font-weight: 600; }
</style>
</head>
<body>
<div id="app">
  <div id="confetti-container" class="confetti-container"></div>

  <!-- PROFILE SCREEN -->
  <div id="profile-screen" class="screen">
    <div class="profile-hero">
      <h1>English Adventure 🚀</h1>
      <p>Who's playing today?</p>
    </div>
    <div class="players-grid" id="players-grid"></div>
  </div>

  <!-- NEW USER SCREEN -->
  <div id="new-user-screen" class="screen">
    <div class="form-card">
      <h2>👤 New Player</h2>
      <p>Pick an avatar and enter your name</p>
      <div class="avatar-picker" id="avatar-picker"></div>
      <input class="name-input" id="new-name-input" type="text" placeholder="Your name..." maxlength="20" />
      <div class="form-btns">
        <button class="form-btn ghost" onclick="show('profile-screen')">← Back</button>
        <button class="form-btn primary" onclick="createUser()">Let's go! 🚀</button>
      </div>
    </div>
  </div>

  <!-- HOME SCREEN -->
  <div id="home-screen" class="screen active">
    <div class="hero">
      <h1>English Adventure 🚀</h1>
      <p id="home-greeting">Learn English words the fun way!</p>
      <button class="back-btn" style="margin-top:10px" onclick="show('profile-screen')">🔄 Switch Player</button>
    </div>

    <div class="section-title">Choose units to practice</div>
    <div class="unit-grid">
      <button class="unit-btn all selected" onclick="toggleUnit('all')">
        <span class="unit-icon">🌟</span>
        All Units (Mix)
      </button>
      <button class="unit-btn" data-unit="1" onclick="toggleUnit(1)">
        <span class="unit-icon">🏫</span>
        Unit 1<br>At School
      </button>
      <button class="unit-btn" data-unit="2" onclick="toggleUnit(2)">
        <span class="unit-icon">⚽</span>
        Unit 2<br>Let's Play
      </button>
      <button class="unit-btn" data-unit="3" onclick="toggleUnit(3)">
        <span class="unit-icon">🐘</span>
        Unit 3<br>Animals
      </button>
      <button class="unit-btn" data-unit="4" onclick="toggleUnit(4)">
        <span class="unit-icon">⚠️</span>
        Unit 4<br>Be Careful!
      </button>
      <button class="unit-btn" data-unit="5" onclick="toggleUnit(5)">
        <span class="unit-icon">🤝</span>
        Unit 5<br>Work Together
      </button>
    </div>

    <div class="section-title">How many questions?</div>
    <div class="unit-grid">
      <button class="unit-btn selected" id="q10" onclick="selectCount(10)"><span class="unit-icon">⚡</span>10 Quick</button>
      <button class="unit-btn" id="q20" onclick="selectCount(20)"><span class="unit-icon">🏆</span>20 Challenge</button>
    </div>

    <button class="start-btn" onclick="startGame()">🎮 Start Game!</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <div class="game-header">
      <div>
        <button class="back-btn" onclick="goHome()">← Home</button>
        <div class="user-badge" id="game-user-badge"></div>
      </div>
      <div class="score-display">
        <span class="stars-count">⭐ <span id="score">0</span></span>
        <span class="hearts" id="hearts">❤️❤️❤️</span>
      </div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label">Question 1 of 10</div>

    <div class="streak-badge" id="streak-badge"></div>

    <div class="question-card" id="question-card">
      <div class="q-type-badge" id="q-type-badge">Translation</div>
      <div class="q-word" id="q-word"></div>
      <div class="q-hint" id="q-hint"></div>
    </div>

    <div class="options-grid" id="options-grid"></div>

    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next ➜</button>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="results-screen" class="screen">
    <div class="results-card">
      <span class="result-emoji" id="result-emoji">🎉</span>
      <div class="result-title" id="result-title">Amazing!</div>
      <div class="result-stars" id="result-stars">⭐⭐⭐</div>
      <div class="result-score" id="result-score">10/10</div>
      <div class="result-subtitle" id="result-subtitle">You got all answers correct!</div>
      <div id="review-section" class="review-section"></div>
      <div class="result-btns">
        <button class="result-btn primary" onclick="startGame()">🔄 Play Again</button>
        <button class="result-btn secondary" onclick="goHome()">🏠 Change Units</button>
      </div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────
//  USER / PERSISTENCE
// ─────────────────────────────────────────────────────────
const AVATARS = ['🦁','🐯','🐧','🦊','🐸','🐼','🦄','🐙','🦋','🦕'];
const AVATAR_COLORS = ['#6c3fc5','#e05252','#2a9d8f','#e76f51','#457b9d','#e9c46a','#8338ec','#06d6a0','#fb5607','#3a86ff'];

let currentUser = null;

function loadUsers() {
  try { return JSON.parse(localStorage.getItem('ea_users') || '{}'); } catch { return {}; }
}
function saveUsers(users) {
  localStorage.setItem('ea_users', JSON.stringify(users));
}

function renderProfileScreen() {
  const users = loadUsers();
  const grid = document.getElementById('players-grid');
  grid.innerHTML = '';

  Object.values(users).forEach(u => {
    const totalGames = u.totalGames || 0;
    const totalStars = u.totalStars || 0;
    const div = document.createElement('div');
    div.className = 'player-card';
    div.innerHTML = `
      <div class="player-avatar" style="background:${u.color}">${u.avatar}</div>
      <div class="player-name">${u.name}</div>
      <div class="player-stats">${totalGames} games · ⭐${totalStars}</div>`;
    div.onclick = () => selectUser(u.name);
    grid.appendChild(div);
  });

  // Add new player button
  const add = document.createElement('div');
  add.className = 'add-player-btn';
  add.innerHTML = `<span class="plus">➕</span>New Player`;
  add.onclick = () => showNewUserForm();
  grid.appendChild(add);
}

function showNewUserForm() {
  // render avatar picker
  const picker = document.getElementById('avatar-picker');
  picker.innerHTML = '';
  let selectedAvatar = AVATARS[0];
  AVATARS.forEach((a, i) => {
    const btn = document.createElement('div');
    btn.className = 'avatar-opt' + (i === 0 ? ' selected' : '');
    btn.textContent = a;
    btn.onclick = () => {
      picker.querySelectorAll('.avatar-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedAvatar = a;
    };
    picker.appendChild(btn);
  });
  document.getElementById('new-name-input').value = '';
  // store selected avatar in closure via data attr
  picker.dataset.selected = AVATARS[0];
  picker.addEventListener('click', () => {
    const sel = picker.querySelector('.avatar-opt.selected');
    if (sel) picker.dataset.selected = sel.textContent;
  });
  show('new-user-screen');
}

function createUser() {
  const name = document.getElementById('new-name-input').value.trim();
  if (!name) { document.getElementById('new-name-input').focus(); return; }
  const picker = document.getElementById('avatar-picker');
  const avatar = (picker.querySelector('.avatar-opt.selected') || { textContent: AVATARS[0] }).textContent;
  const colorIdx = AVATARS.indexOf(avatar);
  const color = AVATAR_COLORS[colorIdx >= 0 ? colorIdx : 0];
  const users = loadUsers();
  if (!users[name]) {
    users[name] = { name, avatar, color, totalGames: 0, totalStars: 0, stats: {} };
    saveUsers(users);
  }
  selectUser(name);
}

function selectUser(name) {
  const users = loadUsers();
  currentUser = users[name];
  document.getElementById('home-greeting').textContent = `Welcome back, ${name}! 👋`;
  document.getElementById('game-user-badge').textContent = `${currentUser.avatar} ${currentUser.name}`;
  show('home-screen');
}

function saveGameStats(questionsPlayed, starsEarned) {
  if (!currentUser) return;
  const users = loadUsers();
  const u = users[currentUser.name];
  if (!u) return;
  u.totalGames = (u.totalGames || 0) + 1;
  u.totalStars  = (u.totalStars  || 0) + starsEarned;
  if (!u.stats) u.stats = {};

  questionsPlayed.forEach(({ q, firstTryCorrect }) => {
    const key = q.question; // English text as key
    if (!u.stats[key]) u.stats[key] = { correct: 0, wrong: 0, lastSeen: 0 };
    if (firstTryCorrect) u.stats[key].correct++;
    else                 u.stats[key].wrong++;
    u.stats[key].lastSeen = Date.now();
  });

  saveUsers(users);
  currentUser = u; // refresh local copy
}

// ─────────────────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────────────────
const VOCAB = [

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'profile-screen') renderProfileScreen();
}

function toggleUnit(u) {
  if (u === 'all') {
    selectedUnits = ['all'];
    document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('selected'));
    document.querySelector('.unit-btn.all').classList.add('selected');
    return;
  }
  const idx = selectedUnits.indexOf('all');
  if (idx > -1) selectedUnits.splice(idx, 1);
  const i = selectedUnits.indexOf(u);
  if (i > -1) { selectedUnits.splice(i, 1); }
  else { selectedUnits.push(u); }
  if (selectedUnits.length === 0) selectedUnits = ['all'];

  document.querySelectorAll('.unit-btn').forEach(b => {
    b.classList.remove('selected');
    const du = b.dataset.unit ? parseInt(b.dataset.unit) : 'all';
    if (selectedUnits.includes(du) || (selectedUnits.includes('all') && du === 'all')) {
      b.classList.add('selected');
    }
  });
  if (selectedUnits.includes('all')) {
    document.querySelector('.unit-btn.all').classList.add('selected');
  }
}

function selectCount(n) {
  questionCount = n;
  document.getElementById('q10').classList.toggle('selected', n === 10);
  document.getElementById('q20').classList.toggle('selected', n === 20);
}

function shuffle(arr) { return [...arr].sort(() => Math.random() - .5); }
function pick(arr, n) { return shuffle(arr).slice(0, n); }

function getPool() {
  if (selectedUnits.includes('all')) return { vocab: VOCAB, phrases: PHRASES, sentences: SENTENCES };
  const units = selectedUnits.filter(u => u !== 'all');
  return {
    vocab: VOCAB.filter(v => units.includes(v.u)),
    phrases: PHRASES.filter(p => units.includes(p.u)),
    sentences: SENTENCES.filter(s => units.includes(s.u)),
  };
}

// ─────────────────────────────────────────────────────────
//  TEXT-TO-SPEECH
// ─────────────────────────────────────────────────────────
function speak(text, onEnd) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = 0.85;
  if (onEnd) utt.onend = onEnd;
  speechSynthesis.speak(utt);
}

function makeVocabQ(item, type) {
  // type: 'e2h' or 'h2e'
  const allH = VOCAB.map(v => v.h);
  const allE = VOCAB.map(v => v.e);
  if (type === 'e2h') {
    const wrong = shuffle(allH.filter(h => h !== item.h)).slice(0, 3);
    const opts = shuffle([item.h, ...wrong]);
    return { kind:'e2h', question: item.e, answer: item.h, options: opts, hintText: '' };
  } else {
    const wrong = shuffle(allE.filter(e => e !== item.e)).slice(0, 3);
    const opts = shuffle([item.e, ...wrong]);
    return { kind:'h2e', question: item.h, answer: item.e, options: opts, hintText: '' };
  }
}

function makePhraseQ(item, type) {
  const allH = PHRASES.map(p => p.h);
  const allE = PHRASES.map(p => p.e);
  if (type === 'e2h') {
    const wrong = shuffle(allH.filter(h => h !== item.h)).slice(0, 3);
    return { kind:'e2h', question: item.e, answer: item.h, options: shuffle([item.h, ...wrong]), hintText:'phrase' };
  } else {
    const wrong = shuffle(allE.filter(e => e !== item.e)).slice(0, 3);
    return { kind:'h2e', question: item.h, answer: item.e, options: shuffle([item.e, ...wrong]), hintText:'phrase' };
  }
}

function makeSentenceQ(item) {
  return {
    kind:'sentence',
    question: item.s,
    answer: item.a,
    options: shuffle(item.opts),
    hintText: 'Complete the sentence'
  };
}

function makeListenQ(item) {
  // pick wrong options from same pool type so lengths are comparable
  const isSentence = LISTEN_SENTENCES.some(s => s.e === item.e);
  const isPhrase   = PHRASES.some(p => p.e === item.e);
  const wrongPool  = isSentence ? LISTEN_SENTENCES : isPhrase ? PHRASES : VOCAB;
  const wrong = shuffle(wrongPool.filter(v => v.h !== item.h)).slice(0, 3).map(v => v.h);
  return {
    kind: 'listen',
    question: item.e,
    answer: item.h,
    options: shuffle([item.h, ...wrong]),
    hintText: ''
  };
}

function buildQuestions() {
  const pool = getPool();
  const qs = [];

  // mix: 35% e2h vocab, 25% h2e vocab, 15% e2h phrase, 10% h2e phrase, 15% sentence
  const n = questionCount;
  const nSentence = Math.round(n * 0.15);
  const nListen  = Math.round(n * 0.20);
  const nPhrase  = Math.round(n * 0.15);
  const nVocab   = n - nSentence - nListen - nPhrase;
  const nE2H = Math.round(nVocab * 0.55);
  const nH2E = nVocab - nE2H;
  const nPhraseE2H = Math.round(nPhrase * 0.5);
  const nPhraseH2E = nPhrase - nPhraseE2H;

  const vocabItems = shuffle(pool.vocab);
  vocabItems.slice(0, nE2H).forEach(v => qs.push(makeVocabQ(v, 'e2h')));
  vocabItems.slice(nE2H, nE2H + nH2E).forEach(v => qs.push(makeVocabQ(v, 'h2e')));

  const phraseItems = shuffle(pool.phrases);
  phraseItems.slice(0, nPhraseE2H).forEach(p => qs.push(makePhraseQ(p, 'e2h')));
  phraseItems.slice(nPhraseE2H, nPhraseE2H + nPhraseH2E).forEach(p => qs.push(makePhraseQ(p, 'h2e')));

  const sentItems = shuffle(pool.sentences);
  sentItems.slice(0, nSentence).forEach(s => qs.push(makeSentenceQ(s)));

  // listen: guarantee ~half are full sentences, rest are words/phrases
  const listenSents = selectedUnits.includes('all')
    ? LISTEN_SENTENCES
    : LISTEN_SENTENCES.filter(s => selectedUnits.filter(u => u !== 'all').includes(s.u));
  const nListenSents  = Math.max(1, Math.floor(nListen / 2));
  const nListenWords  = nListen - nListenSents;
  shuffle(listenSents).slice(0, nListenSents).forEach(item => qs.push(makeListenQ(item)));
  shuffle([...pool.vocab, ...pool.phrases]).slice(0, nListenWords).forEach(item => qs.push(makeListenQ(item)));

  return shuffle(qs).slice(0, n);
}

// ─────────────────────────────────────────────────────────
//  GAME FLOW
// ─────────────────────────────────────────────────────────
function startGame() {
  questions = buildQuestions();
  if (questions.length === 0) {
    alert('No questions available for selected units. Please select more units!');
    return;
  }
  currentQ = 0; score = 0; lives = 3; streak = 0; wrongAnswers = []; questionLog = [];
  show('game-screen');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  currentQuestion = q;
  answered = false;
  resetting = false;

  // progress
  const pct = (currentQ / questions.length) * 100;
  $('progress-fill').style.width = pct + '%';
  $('progress-label').textContent = `Question ${currentQ + 1} of ${questions.length}`;

  // score / hearts
  $('score').textContent = score;
  $('hearts').textContent = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);

  // streak
  $('streak-badge').textContent = streak >= 3 ? `🔥 ${streak} in a row!` : '';

  // question
  const badge = q.kind === 'e2h'    ? '🇬🇧 → 🇮🇱 Translate to Hebrew'
              : q.kind === 'h2e'    ? '🇮🇱 → 🇬🇧 Translate to English'
              : q.kind === 'listen' ? '🎧 Listen & Choose Hebrew'
              : '✏️ Complete the Sentence';
  $('q-type-badge').textContent = badge;

  const wordEl = $('q-word');
  const hintEl = $('q-hint');

  if (q.kind === 'sentence') {
    wordEl.className = 'q-sentence';
    wordEl.innerHTML = q.question.replace('___', '<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
    hintEl.textContent = 'Pick the correct word';
  } else if (q.kind === 'listen') {
    wordEl.className = 'q-word';
    wordEl.innerHTML = `<button class="listen-btn" id="listen-play-btn" onclick="triggerSpeak()">🔊 Tap to Listen</button>`;
    hintEl.textContent = '';
    // auto-play after short delay
    setTimeout(() => triggerSpeak(), 400);
  } else {
    wordEl.className = q.kind === 'h2e' ? 'q-word hebrew' : 'q-word';
    wordEl.textContent = q.question;
    hintEl.textContent = q.hintText === 'phrase' ? '💬 Conversational phrase' : '';
  }

  // options
  const grid = $('options-grid');
  grid.innerHTML = '';
  const isHebrew = q.kind === 'e2h' || q.kind === 'listen'; // answers will be hebrew
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (isHebrew ? ' hebrew-opt' : '');
    btn.textContent = opt;
    btn.onclick = () => answer(opt, q.answer);
    grid.appendChild(btn);
  });

  // feedback / next
  const fb = $('feedback');
  fb.className = 'feedback';
  fb.textContent = '';
  $('next-btn').className = 'next-btn';
}

function triggerSpeak() {
  if (!currentQuestion || currentQuestion.kind !== 'listen') return;
  const btn = document.getElementById('listen-play-btn');
  if (btn) btn.classList.add('playing');
  speak(currentQuestion.question, () => {
    if (btn) btn.classList.remove('playing');
  });
}

function answer(chosen, correct) {
  if (answered || resetting) return;
  const isCorrect = chosen === correct;
  const btns = document.querySelectorAll('.opt-btn');
  const fb = $('feedback');

  if (isCorrect) {
    answered = true;
    const firstTry = !currentQuestion._wrongLogged;
    questionLog.push({ q: currentQuestion, firstTryCorrect: firstTry });
    // mark correct button green, disable all
    btns.forEach(b => {
      b.classList.add('disabled');
      if (b.textContent === correct) b.classList.add('correct');
    });
    streak++;
    const bonus = streak >= 3 ? 2 : 1;
    score += bonus;
    $('score').textContent = score;
    fb.className = 'feedback correct show';
    fb.textContent = streak >= 3
      ? `🔥 Awesome! +${bonus} (streak bonus!)`
      : ['✅ Correct! Well done!', '🎉 Great job!', '⭐ Excellent!', '💪 You got it!'][Math.floor(Math.random()*4)];
    if (streak === 5 || score % 10 === 0) confetti();
    playTone(true);
    $('next-btn').className = 'next-btn show';
    $('next-btn').textContent = (currentQ + 1 >= questions.length) ? 'See Results 🏆' : 'Next ➜';
  } else {
    // first wrong attempt on this question?
    if (!currentQuestion._wrongLogged) {
      currentQuestion._wrongLogged = true;
      streak = 0;
      lives--;
      $('hearts').textContent = '❤️'.repeat(Math.max(0,lives)) + '🖤'.repeat(3 - Math.max(0,lives));
      wrongAnswers.push({ q: currentQuestion, chosen, correct });
    }
    // briefly flash the wrong button red, then reset all to normal
    resetting = true;
    btns.forEach(b => {
      if (b.textContent === chosen) b.classList.add('wrong');
    });
    fb.className = 'feedback wrong show';
    fb.textContent = '❌ Not quite — try again!';
    $('question-card').classList.add('shake');
    setTimeout(() => {
      $('question-card').classList.remove('shake');
      btns.forEach(b => b.classList.remove('wrong'));
      fb.className = 'feedback';
      resetting = false;
    }, 800);
    playTone(false);

    // if no lives left, end game
    if (lives <= 0) {
      answered = true;
      btns.forEach(b => b.classList.add('disabled'));
      $('next-btn').className = 'next-btn show';
      $('next-btn').textContent = 'See Results 🏆';
    }
  }
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length || lives <= 0) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  const total = questions.length;
  const pct = score / total;
  let emoji, title, stars;
  if (lives === 0) { emoji = '😅'; title = 'Game Over!'; stars = score >= total * .5 ? '⭐⭐' : '⭐'; }
  else if (pct >= .9) { emoji = '🏆'; title = 'AMAZING!'; stars = '⭐⭐⭐'; confetti(); confetti(); }
  else if (pct >= .7) { emoji = '🎉'; title = 'Great Job!'; stars = '⭐⭐⭐'; confetti(); }
  else if (pct >= .5) { emoji = '😊'; title = 'Good Work!'; stars = '⭐⭐'; }
  else { emoji = '💪'; title = 'Keep Practicing!'; stars = '⭐'; }

  $('result-emoji').textContent = emoji;
  $('result-title').textContent = title;
  $('result-stars').textContent = stars;
  $('result-score').textContent = `${score} pts`;
  $('result-subtitle').textContent = lives === 0
    ? `You ran out of hearts after ${currentQ} questions.`
    : `You scored ${score} points on ${total} questions!`;

  saveGameStats(questionLog, [...stars].filter(c => c === '⭐').length);

  const reviewEl = $('review-section');
  if (wrongAnswers.length === 0) {
    reviewEl.innerHTML = '<div class="review-title" style="color:#6ee7b7">🎯 Perfect — no mistakes!</div>';
  } else {
    let html = `<div class="review-title">📝 Review your mistakes (${wrongAnswers.length})</div>`;
    wrongAnswers.forEach(({ q, chosen, correct }) => {
      let qLabel;
      if (q.kind === 'sentence') {
        qLabel = q.question.replace('___', '<span style="color:var(--secondary)">___</span>');
      } else if (q.kind === 'e2h') {
        qLabel = `Translate <strong>${q.question}</strong> to Hebrew`;
      } else if (q.kind === 'listen') {
        qLabel = `🎧 Listen: <strong>${q.question}</strong> → Hebrew`;
      } else {
        qLabel = `Translate <strong style="direction:rtl;display:inline-block">${q.question}</strong> to English`;
      }
      const chosenDir = q.kind === 'e2h' ? 'direction:rtl' : '';
      const correctDir = q.kind === 'e2h' ? 'direction:rtl' : '';
      html += `
        <div class="review-item">
          <div class="review-q">${qLabel}</div>
          <div class="review-chosen">✗ You chose: <span style="${chosenDir}">${chosen}</span></div>
          <div class="review-correct">✓ Correct: <span style="${correctDir}">${correct}</span></div>
        </div>`;
    });
    reviewEl.innerHTML = html;
  }

  show('results-screen');
}

// ─────────────────────────────────────────────────────────
//  AUDIO
// ─────────────────────────────────────────────────────────
function playTone(correct) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (correct) {
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + .1);
      osc.frequency.setValueAtTime(784, ctx.currentTime + .2);
    } else {
      osc.frequency.setValueAtTime(330, ctx.currentTime);
      osc.frequency.setValueAtTime(220, ctx.currentTime + .15);
    }
    gain.gain.setValueAtTime(.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .5);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + .5);
  } catch(e) {}
}

show('profile-screen');

function confetti() {
  const container = $('confetti-container');
  const colors = ['#f59e0b','#6c3fc5','#10b981','#ef4444','#3b82f6','#ec4899','#a78bfa'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.cssText = `
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${6+Math.random()*8}px;
      height:${6+Math.random()*8}px;
      border-radius:${Math.random()>.5?'50%':'2px'};
      animation-duration:${1.5+Math.random()*2}s;
      animation-delay:${Math.random()*.5}s;
    `;
    container.appendChild(piece);
    setTimeout(() => piece.remove(), 4000);
  }
}
